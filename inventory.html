<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management - OYERA SERVICE BAY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segui UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        padding: 20px;
    }

    .navbar {
        background: linear-gradient(135deg, rgb(31, 60, 82) 0%, rgb(41, 80, 102) 100%);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        margin-bottom: 30px;
    }

    .container-main {
        max-width: 1200px;
        margin: 0 auto;
    }

    .page-header {
        text-align: center;
        margin-bottom: 40px;
        color: rgb(31, 60, 82);
    }

    .page-header h1 {
        font-size: 2.2rem;
        font-weight: bold;
        margin-bottom: 10px;
    }

    /* Filter and Search Section */
    .filter-section {
        background: white;
        border-radius: 12px;
        padding: 25px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
    }

    .filter-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
    }

    .form-group label {
        font-weight: 600;
        color: rgb(31, 60, 82);
        margin-bottom: 8px;
    }

    .form-group input,
    .form-group select {
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 0.95rem;
        transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: rgb(31, 60, 82);
    }

    /* Statistics Section */
    .stats-section {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .stat-card {
        background: white;
        border-radius: 12px;
        padding: 25px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        text-align: center;
        border-left: 5px solid rgb(31, 60, 82);
    }

    .stat-card .icon {
        font-size: 2.5rem;
        margin-bottom: 10px;
    }

    .stat-card .number {
        font-size: 1.8rem;
        font-weight: bold;
        color: rgb(31, 60, 82);
        margin-bottom: 5px;
    }

    .stat-card .label {
        color: #666;
        font-size: 0.95rem;
    }

    /* Inventory Table Section */
    .inventory-section {
        background: white;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .section-title {
        color: rgb(31, 60, 82);
        font-size: 1.5rem;
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 3px solid rgb(31, 60, 82);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .table-responsive {
        margin-top: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    thead {
        background-color: rgb(31, 60, 82);
        color: white;
    }

    th {
        padding: 15px;
        text-align: left;
        font-weight: 600;
        border: none;
    }

    td {
        padding: 12px 15px;
        border-bottom: 1px solid #eee;
    }

    tbody tr:hover {
        background-color: #f8f9fa;
    }

    tbody tr:nth-child(even) {
        background-color: #f5f5f5;
    }

    /* Status Badges */
    .badge-in-stock {
        background-color: #d4edda;
        color: #155724;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
    }

    .badge-low-stock {
        background-color: #fff3cd;
        color: #856404;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
    }

    .badge-out-of-stock {
        background-color: #f8d7da;
        color: #721c24;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
    }

    .badge-critical {
        background-color: #ff6b6b;
        color: white;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.85rem;
        font-weight: 600;
        animation: blink 1s infinite;
    }

    @keyframes blink {
        0%, 50%, 100% { opacity: 1; }
        25%, 75% { opacity: 0.7; }
    }

    .progress-bar-custom {
        height: 20px;
        background-color: #e9ecef;
        border-radius: 10px;
        overflow: hidden;
    }

    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #28a745, #20c997);
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 0.75rem;
        font-weight: 600;
    }

    .progress-fill.low {
        background: linear-gradient(90deg, #ffc107, #ff9800);
    }

    .progress-fill.critical {
        background: linear-gradient(90deg, #ff6b6b, #dc3545);
    }

    /* Action Buttons */
    .action-buttons {
        display: flex;
        gap: 8px;
    }

    .btn-edit, .btn-delete, .btn-reorder {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        font-weight: 600;
        transition: all 0.3s;
    }

    .btn-edit {
        background-color: #007bff;
        color: white;
    }

    .btn-edit:hover {
        background-color: #0056b3;
    }

    .btn-reorder {
        background-color: #28a745;
        color: white;
    }

    .btn-reorder:hover {
        background-color: #218838;
    }

    .btn-delete {
        background-color: #dc3545;
        color: white;
    }

    .btn-delete:hover {
        background-color: #c82333;
    }

    /* Low Stock Alert */
    .alert-section {
        background: white;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        margin-top: 30px;
    }

    .alert-list {
        list-style: none;
        margin-top: 20px;
    }

    .alert-item {
        padding: 15px;
        background: #fff3cd;
        border-left: 4px solid #ffc107;
        border-radius: 8px;
        margin-bottom: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .alert-item.critical {
        background: #f8d7da;
        border-left-color: #dc3545;
    }

    .no-data {
        text-align: center;
        padding: 40px;
        color: #999;
    }

    .no-data i {
        font-size: 3rem;
        margin-bottom: 15px;
        color: #ddd;
    }

    @media (max-width: 768px) {
        .filter-row {
            grid-template-columns: 1fr;
        }

        .table-responsive {
            font-size: 0.9rem;
        }

        th, td {
            padding: 8px 10px;
        }
    }
</style>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-cog"></i> OYERA SERVICE BAY
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html"><i class="fas fa-home"></i> Home</a>
                    <a class="nav-link" href="dashboard.html"><i class="fas fa-dashboard"></i> Dashboard</a>
                    <a class="nav-link" href="service-booking.html"><i class="fas fa-calendar"></i> Book Service</a>
                    <a class="nav-link active" href="inventory.html"><i class="fas fa-boxes"></i> Inventory</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-main">
        <!-- Page Header -->
        <div class="page-header">
            <h1>📦 Spare Parts Inventory Management</h1>
            <p>Monitor stock levels, manage parts, and track orders</p>
        </div>

        <!-- Filter and Search Section -->
        <div class="filter-section">
            <div class="section-title">
                <i class="fas fa-filter"></i> Filter & Search
            </div>
            <div class="filter-row">
                <div class="form-group">
                    <label for="searchInput">Search Parts:</label>
                    <input type="text" id="searchInput" placeholder="Search by part name...">
                </div>
                <div class="form-group">
                    <label for="categoryFilter">Filter by Category:</label>
                    <select id="categoryFilter">
                        <option value="">All Categories</option>
                        <option value="Oils">Oils</option>
                        <option value="Filters">Filters</option>
                        <option value="Fluids">Fluids</option>
                        <option value="Brake Parts">Brake Parts</option>
                        <option value="Grease">Grease</option>
                        <option value="Suspension">Suspension</option>
                        <option value="Electrical">Electrical</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="stockFilter">Stock Status:</label>
                    <select id="stockFilter">
                        <option value="">All Items</option>
                        <option value="low">Low Stock</option>
                        <option value="out">Out of Stock</option>
                        <option value="critical">Critical (Reorder)</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Statistics Section -->
        <div class="stats-section" id="statsSection">
            <!-- Dynamically populated -->
        </div>

        <!-- Inventory Table -->
        <div class="inventory-section">
            <div class="section-title">
                <i class="fas fa-list"></i> Inventory Details
            </div>
            <div class="table-responsive">
                <table id="inventoryTable">
                    <thead>
                        <tr>
                            <th>Part Name</th>
                            <th>Category</th>
                            <th>Unit Price</th>
                            <th>Quantity</th>
                            <th>Reorder Level</th>
                            <th>Stock Level</th>
                            <th>Total Value</th>
                            <th>Supplier</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="inventoryBody">
                        <!-- Dynamically populated -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Low Stock Alert Section -->
        <div class="alert-section" id="alertSection" style="display: none;">
            <div class="section-title">
                <i class="fas fa-exclamation-triangle"></i> Low Stock Alerts
            </div>
            <ul class="alert-list" id="alertList">
                <!-- Dynamically populated -->
            </ul>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="service-management.js"></script>
    <script src="inventory.js"></script>
</body>
</html>
