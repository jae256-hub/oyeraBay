<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Booking - OYERA SERVICE BAY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Segui UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        min-height: 100vh;
        padding: 20px;
    }

    .navbar {
        background: linear-gradient(135deg, rgb(31, 60, 82) 0%, rgb(41, 80, 102) 100%);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        margin-bottom: 30px;
    }

    .navbar-brand {
        font-size: 1.5rem;
        font-weight: bold;
        color: white !important;
    }

    .nav-link {
        color: rgba(255, 255, 255, 0.9) !important;
        transition: color 0.3s;
    }

    .nav-link:hover {
        color: white !important;
    }

    .container-main {
        max-width: 1200px;
        margin: 0 auto;
    }

    .page-header {
        text-align: center;
        margin-bottom: 40px;
        color: rgb(31, 60, 82);
    }

    .page-header h1 {
        font-size: 2.2rem;
        font-weight: bold;
        margin-bottom: 10px;
    }

    /* Service Selection Section */
    .service-selection-section {
        background: white;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
    }

    .section-title {
        color: rgb(31, 60, 82);
        font-size: 1.5rem;
        margin-bottom: 25px;
        padding-bottom: 15px;
        border-bottom: 3px solid rgb(31, 60, 82);
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .vehicle-type-selector {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 30px;
    }

    .vehicle-type-btn {
        padding: 20px;
        border: 2px solid #ddd;
        border-radius: 10px;
        background: white;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
        font-weight: 600;
    }

    .vehicle-type-btn:hover {
        border-color: rgb(31, 60, 82);
        box-shadow: 0 4px 12px rgba(31, 60, 82, 0.2);
    }

    .vehicle-type-btn.active {
        background: linear-gradient(135deg, rgb(31, 60, 82) 0%, rgb(41, 80, 102) 100%);
        color: white;
        border-color: rgb(31, 60, 82);
    }

    .vehicle-icon {
        font-size: 2rem;
        margin-bottom: 10px;
    }

    .services-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .service-card {
        background: white;
        border: 2px solid #eee;
        border-radius: 10px;
        padding: 20px;
        cursor: pointer;
        transition: all 0.3s;
        position: relative;
    }

    .service-card:hover {
        border-color: rgb(31, 60, 82);
        box-shadow: 0 6px 20px rgba(31, 60, 82, 0.15);
        transform: translateY(-3px);
    }

    .service-card.selected {
        background: #f0f4f8;
        border-color: rgb(31, 60, 82);
        box-shadow: 0 6px 20px rgba(31, 60, 82, 0.25);
    }

    .service-icon {
        font-size: 2rem;
        margin-bottom: 10px;
    }

    .service-name {
        font-weight: 600;
        color: rgb(31, 60, 82);
        margin-bottom: 8px;
        font-size: 1.1rem;
    }

    .service-description {
        font-size: 0.9rem;
        color: #666;
        margin-bottom: 10px;
    }

    .service-duration {
        font-size: 0.85rem;
        color: #999;
        margin-bottom: 10px;
    }

    .service-price {
        font-weight: bold;
        color: rgb(31, 60, 82);
        font-size: 1.1rem;
        margin-top: 10px;
    }

    .service-category {
        display: inline-block;
        background: #e8f1f7;
        color: rgb(31, 60, 82);
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 0.8rem;
        font-weight: 600;
        margin-top: 10px;
    }

    .checkbox-service {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 24px;
        height: 24px;
        cursor: pointer;
    }

    /* Selected Services Summary */
    .selected-services-summary {
        background: white;
        border-radius: 12px;
        padding: 25px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
        display: none;
    }

    .selected-services-summary.show {
        display: block;
    }

    .selected-list {
        list-style: none;
        margin-bottom: 20px;
    }

    .selected-list li {
        padding: 10px;
        background: #f8f9fa;
        margin-bottom: 8px;
        border-radius: 6px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .remove-service {
        background: #ff6b6b;
        color: white;
        border: none;
        border-radius: 4px;
        padding: 4px 12px;
        cursor: pointer;
        font-size: 0.85rem;
    }

    .cost-summary {
        background: #f0f4f8;
        padding: 15px;
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 600;
        font-size: 1.1rem;
        color: rgb(31, 60, 82);
        margin-top: 15px;
    }

    /* Spare Parts Section */
    .spare-parts-section {
        background: white;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
    }

    .parts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 25px;
    }

    .part-card {
        background: white;
        border: 2px solid #eee;
        border-radius: 8px;
        padding: 15px;
        cursor: pointer;
        transition: all 0.3s;
    }

    .part-card:hover {
        border-color: rgb(31, 60, 82);
        box-shadow: 0 4px 12px rgba(31, 60, 82, 0.15);
    }

    .part-card.selected {
        background: #f0f4f8;
        border-color: rgb(31, 60, 82);
    }

    .part-name {
        font-weight: 600;
        color: rgb(31, 60, 82);
        margin-bottom: 5px;
    }

    .part-price {
        color: #666;
        font-size: 0.9rem;
        margin-bottom: 8px;
    }

    .part-stock {
        font-size: 0.85rem;
        color: #999;
    }

    .part-stock.low {
        color: #ff6b6b;
        font-weight: 600;
    }

    .quantity-input {
        width: 60px;
        padding: 5px;
        border: 1px solid #ddd;
        border-radius: 4px;
        margin-top: 8px;
    }

    /* Booking Form */
    .booking-form-section {
        background: white;
        border-radius: 12px;
        padding: 30px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        margin-bottom: 30px;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
    }

    .form-row.full {
        grid-template-columns: 1fr;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group label {
        font-weight: 600;
        color: rgb(31, 60, 82);
        margin-bottom: 8px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        transition: border-color 0.3s;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
        outline: none;
        border-color: rgb(31, 60, 82);
        box-shadow: 0 0 0 3px rgba(31, 60, 82, 0.1);
    }

    .form-group textarea {
        resize: vertical;
        min-height: 80px;
    }

    .technician-selection {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 12px;
        margin-top: 12px;
    }

    .tech-option {
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
        text-align: center;
    }

    .tech-option:hover {
        border-color: rgb(31, 60, 82);
    }

    .tech-option.selected {
        background: linear-gradient(135deg, rgb(31, 60, 82) 0%, rgb(41, 80, 102) 100%);
        color: white;
        border-color: rgb(31, 60, 82);
    }

    /* Buttons */
    .btn-submit {
        background: linear-gradient(135deg, rgb(31, 60, 82) 0%, rgb(41, 80, 102) 100%);
        color: white;
        padding: 15px 40px;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        font-size: 1rem;
        transition: transform 0.3s, box-shadow 0.3s;
        width: 100%;
    }

    .btn-submit:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(31, 60, 82, 0.3);
    }

    .btn-submit:disabled {
        background: #ccc;
        cursor: not-allowed;
        transform: none;
    }

    /* Message Alert */
    .message {
        padding: 15px;
        border-radius: 8px;
        margin: 20px 0;
        display: none;
    }

    .message.show {
        display: block;
    }

    .message.success {
        background: #d4edda;
        color: #155724;
        border: 1px solid #c3e6cb;
    }

    .message.error {
        background: #f8d7da;
        color: #721c24;
        border: 1px solid #f5c6cb;
    }

    @media (max-width: 768px) {
        .form-row {
            grid-template-columns: 1fr;
        }

        .services-grid {
            grid-template-columns: 1fr;
        }

        .vehicle-type-selector {
            grid-template-columns: 1fr;
        }

        .page-header h1 {
            font-size: 1.5rem;
        }
    }
</style>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-cog"></i> OYERA SERVICE BAY
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="index.html"><i class="fas fa-home"></i> Home</a>
                    <a class="nav-link" href="dashboard.html"><i class="fas fa-dashboard"></i> Dashboard</a>
                    <a class="nav-link active" href="service-booking.html"><i class="fas fa-calendar"></i> Book Service</a>
                    <a class="nav-link" href="inventory.html"><i class="fas fa-boxes"></i> Inventory</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="container-main">
        <!-- Page Header -->
        <div class="page-header">
            <h1>📅 Service Booking System</h1>
            <p>Select services, spare parts, and book your vehicle service</p>
        </div>

        <div id="message" class="message"></div>

        <!-- Vehicle Type Selection -->
        <div class="service-selection-section">
            <div class="section-title">
                <i class="fas fa-car"></i> Select Vehicle Type
            </div>
            <div class="vehicle-type-selector" id="vehicleTypeSelector">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- Services Selection -->
        <div class="service-selection-section">
            <div class="section-title">
                <i class="fas fa-tools"></i> Available Services
            </div>
            <div id="servicesContainer" class="services-grid">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- Selected Services Summary -->
        <div class="selected-services-summary" id="selectedSummary">
            <div class="section-title">
                <i class="fas fa-list-check"></i> Selected Services
            </div>
            <ul class="selected-list" id="selectedList">
                <!-- Dynamically populated -->
            </ul>
            <div class="cost-summary">
                <span>Total Estimated Cost:</span>
                <span id="totalCost">UGX 0</span>
            </div>
        </div>

        <!-- Spare Parts Selection -->
        <div class="spare-parts-section">
            <div class="section-title">
                <i class="fas fa-boxes"></i> Spare Parts (Optional)
            </div>
            <div id="partsContainer" class="parts-grid">
                <!-- Dynamically populated -->
            </div>
        </div>

        <!-- Booking Form -->
        <div class="booking-form-section">
            <div class="section-title">
                <i class="fas fa-edit"></i> Booking Details
            </div>
            <form id="bookingForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="customerName">Customer Name *</label>
                        <input type="text" id="customerName">
                    </div>
                    <div class="form-group">
                        <label for="customerPhone">Phone Number *</label>
                        <input type="tel" id="customerPhone">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="carModel">Car Model *</label>
                        <input type="text" id="carModel" placeholder="e.g., Toyota Corolla 2020">
                    </div>
                    <div class="form-group">
                        <label for="licensePlate">License Plate *</label>
                        <input type="text" id="licensePlate" placeholder="e.g., UCC 123A">
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label for="bookingDate">Preferred Service Date *</label>
                        <input type="date" id="bookingDate">
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label>Assign Technicians (Optional)</label>
                        <div class="technician-selection" id="technicianSelection">
                            <!-- Dynamically populated -->
                        </div>
                    </div>
                </div>

                <div class="form-row full">
                    <div class="form-group">
                        <label for="notes">Additional Notes</label>
                        <textarea id="notes" placeholder="Any special requests or notes..."></textarea>
                    </div>
                </div>

                <button type="submit" class="btn-submit">📝 Confirm Booking</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="service-management.js"></script>
    <script src="service-booking.js"></script>
</body>
</html>
